name: Static Analysis (Incremental)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # fetch-depth: 0 is required to fetch all history for all branches and tags, 
        # allowing the action to compare commits and find changed files.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: pip install ruff pre-commit

      # 1. Get all Python files modified in this commit/PR
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.py

      # 2. Run Ruff Linter ONLY on changed Python files
      - name: Run Ruff Linter on changed files
        # Run only if there are Python files modified to prevent Ruff from failing on an empty file list
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          ruff check ${{ steps.changed-files.outputs.all_changed_files }}

      # 3. Run Ruff Format ONLY on changed Python files
      - name: Run Ruff Format on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          ruff format --check ${{ steps.changed-files.outputs.all_changed_files }}

      # 4. Get all changed files regardless of extension (prepared for the EOF fixer)
      - name: Get all changed files
        id: all-changed-files
        uses: tj-actions/changed-files@v44

      # 5. Run End of File Fixer ONLY on changed files
      - name: Run End of File Fixer
        if: steps.all-changed-files.outputs.any_changed == 'true'
        run: |
          pre-commit run end-of-file-fixer --files ${{ steps.all-changed-files.outputs.all_changed_files }}
